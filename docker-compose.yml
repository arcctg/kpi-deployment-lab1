services:
  db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_USER: mywebapp
      POSTGRES_PASSWORD: mywebapp
      POSTGRES_DB: mywebapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - mywebapp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mywebapp -d mywebapp"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  app:
    build: .
    volumes:
      - ./deploy/docker-config.yaml:/etc/mywebapp/config.yaml:ro
    networks:
      - mywebapp-net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:stable-bookworm
    ports:
      - "8080:80"
    volumes:
      - ./deploy/docker-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mywebapp-net
    depends_on:
      - app
    restart: unless-stopped

networks:
  mywebapp-net:
    driver: bridge

volumes:
  pgdata:
